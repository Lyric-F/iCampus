# 端口
server.port=8080

# 数据库连接
spring.datasource.url=jdbc:mysql://localhost:3306/campus_db?useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456!Qwerty
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 头像上传目录（原有）
file.upload-dir=./uploads/avatars/
file.access-url=/uploads/avatars/

# 帖子图片上传目录（新增）
post.image.upload-dir=./uploads/posts/
post.image.access-url=/uploads/posts/

# 文件大小限制
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB