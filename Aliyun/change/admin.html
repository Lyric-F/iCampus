<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推荐系统管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1e3c72;
        }
        .stats-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            min-width: 180px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card h3 {
            margin: 0 0 10px;
            color: #666;
            font-size: 16px;
        }
        .card .number {
            font-size: 32px;
            font-weight: bold;
            color: #1890ff;
        }
        .chart-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            min-width: 400px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chart-box h2 {
            margin-top: 0;
            font-size: 18px;
            color: #333;
        }
        .chart {
            width: 100%;
            height: 300px;
        }
        @media (max-width: 768px) {
            .chart-box {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>推荐系统管理后台</h1>
    <div class="stats-cards" id="stats-cards">
        <div class="card"><h3>总用户数</h3><div class="number" id="total-users">-</div></div>
        <div class="card"><h3>总帖子数</h3><div class="number" id="total-posts">-</div></div>
        <div class="card"><h3>总交互数</h3><div class="number" id="total-interactions">-</div></div>
        <div class="card"><h3>最终AUC</h3><div class="number" id="final-auc">-</div></div>
    </div>

    <div class="chart-row">
        <div class="chart-box">
            <h2>推荐模型训练曲线 (AUC) - 最后一次训练</h2>
            <div id="auc-chart" class="chart"></div>
        </div>
        <div class="chart-box">
            <h2>交互行为分布</h2>
            <div id="action-chart" class="chart"></div>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-box">
            <h2>热门帖子标签 Top 10</h2>
            <div id="tag-chart" class="chart"></div>
        </div>
        <div class="chart-box">
            <h2>用户活跃度分布</h2>
            <div id="user-activity-chart" class="chart"></div>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-box" style="width:100%">
            <h2>每日交互趋势</h2>
            <div id="trend-chart" class="chart" style="height: 400px;"></div>
        </div>
    </div>
</div>

<script>
    // 1. 获取训练曲线数据（单条）
    fetch('/admin/training-log')
        .then(res => res.json())
        .then(data => {
            const epochs = data.epochs;
            const aucs = data.aucs;
            const finalAuc = data.final_auc;
            document.getElementById('final-auc').innerText = finalAuc.toFixed(4);

            // 准备数据点格式：[epoch, auc]
            const points = epochs.map((epoch, idx) => [epoch, aucs[idx]]);

            const aucChart = echarts.init(document.getElementById('auc-chart'));
            aucChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: {
                    name: 'Epoch',
                    type: 'value',
                    min: 0,
                    max: 90,
                    axisLabel: { rotate: 0 }
                },
                yAxis: { name: 'AUC', min: 0.5, max: 0.85 },
                series: [{
                    name: 'Validation AUC',
                    type: 'line',
                    data: points,
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 6,
                    lineStyle: { color: '#1890ff', width: 3 },
                    areaStyle: { opacity: 0.1 }
                }]
            });
        })
        .catch(err => console.error('加载训练曲线失败', err));

    // 2. 获取其他统计图表
    fetch('/admin/stats')
        .then(res => res.json())
        .then(data => {
            document.getElementById('total-users').innerText = data.total_users;
            document.getElementById('total-posts').innerText = data.total_posts;
            document.getElementById('total-interactions').innerText = data.total_interactions;

            // 行为分布饼图
            const actionChart = echarts.init(document.getElementById('action-chart'));
            actionChart.setOption({
                tooltip: { trigger: 'item' },
                legend: { top: 'bottom' },
                series: [{
                    type: 'pie',
                    radius: '50%',
                    data: Object.entries(data.action_distribution).map(([name, value]) => ({ name, value })),
                    label: { show: true, formatter: '{b}: {d}%' }
                }]
            });

            // 标签柱状图
            const tagChart = echarts.init(document.getElementById('tag-chart'));
            const tags = Object.entries(data.tag_distribution);
            tagChart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                xAxis: { type: 'category', data: tags.map(t => t[0]), axisLabel: { rotate: 45 } },
                yAxis: { type: 'value', name: '帖子数量' },
                series: [{ type: 'bar', data: tags.map(t => t[1]), itemStyle: { color: '#52c41a' } }]
            });

            // 用户活跃度分布
            const activityChart = echarts.init(document.getElementById('user-activity-chart'));
            const activityData = Object.entries(data.user_activity);
            activityChart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                xAxis: { type: 'category', data: activityData.map(a => a[0]) },
                yAxis: { type: 'value', name: '用户数' },
                series: [{ type: 'bar', data: activityData.map(a => a[1]), itemStyle: { color: '#faad14' } }]
            });

            // 每日趋势折线图
            const trendChart = echarts.init(document.getElementById('trend-chart'));
            const dates = Object.keys(data.daily_trend).sort();
            const counts = dates.map(d => data.daily_trend[d]);
            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: dates, axisLabel: { rotate: 45 } },
                yAxis: { type: 'value', name: '交互次数' },
                series: [{ type: 'line', data: counts, smooth: true, lineStyle: { color: '#722ed1' } }]
            });
        })
        .catch(err => console.error('加载统计数据失败', err));
</script>
</body>
</html>
