<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>消息中心 - iCampus</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fafcff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { max-width: 540px; width: 100%; margin: 0 auto; background: inherit; min-height: 100vh; display: flex; flex-direction: column; }
        .top-bar { background: white; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #eef2f6; flex-shrink: 0; }
        .back-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: #f5f5f7; border-radius: 50%; cursor: pointer; color: var(--primary); }
        .top-title { flex: 1; font-size: 18px; font-weight: 600; text-align: center; }
        .tabs { display: flex; border-bottom: 1px solid #eef2f6; background: white; position: relative; }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 15px; font-weight: 500; color: #8e8e93; cursor: pointer; position: relative; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--primary); }
        .badge {
            position: absolute;
            top: 6px;
            right: 20%;
            background: #ff3b30;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
            min-width: 18px;
            text-align: center;
        }
        .scroll-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-bottom: 0.5px solid var(--border-light);
        }
        .toolbar-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--primary);
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }
        .toolbar-btn:active { background: rgba(var(--primary-rgb, 0,113,227), 0.1); }
        .conversation-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: white; border-bottom: 1px solid #f0f0f0; cursor: pointer; position: relative; }
        .conv-avatar { width: 48px; height: 48px; border-radius: 50%; background: #eef3fc; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--primary); overflow: hidden; }
        .conv-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .conv-info { flex: 1; }
        .conv-name { font-weight: 600; margin-bottom: 4px; }
        .conv-preview { font-size: 12px; color: #8e8e93; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-time { font-size: 10px; color: #c6c6c8; }
        .delete-conv-btn {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 16px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            margin-left: 8px;
        }
        .delete-conv-btn:active { background: rgba(255,59,48,0.1); }
        .notification-item {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin: 8px 16px;
            border: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
            cursor: pointer;
        }
        .notification-item.unread { background: #e8f0fe; border-left: 3px solid var(--primary); }
        .notification-content { flex: 1; }
        .notification-message { font-size: 14px; margin-bottom: 8px; }
        .notification-time { font-size: 11px; color: #8e8e93; }
        .notification-actions { display: flex; gap: 8px; }
        .notify-mark-read, .notify-delete {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .notify-mark-read { color: var(--primary); }
        .notify-delete { color: #ff3b30; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #fafcff; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 20px; font-size: 14px; }
        .message.sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .message.received { align-self: flex-start; background: #eef2f6; color: #1c1c1e; border-bottom-left-radius: 4px; }
        .chat-input-area { display: flex; gap: 8px; padding: 12px 16px; background: white; border-top: 1px solid #eef2f6; }
        .chat-input { flex: 1; border: 1px solid #ddd; border-radius: 28px; padding: 10px 16px; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; border-radius: 28px; padding: 0 20px; cursor: pointer; }
        .limit-tip { text-align: center; font-size: 12px; color: #ff9500; padding: 4px; background: #fff2e0; margin: 8px 16px; border-radius: 20px; }
        .empty-state { text-align: center; padding: 40px; color: #8e8e93; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 540px; margin: 0 auto; background: white; display: flex; justify-content: space-around; padding: 10px 20px 24px; border-top: 1px solid #eef2f6; z-index: 99; }
        .nav-item { position: relative;display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem; color: #9095ae; cursor: pointer; }
        .nav-item i { font-size: 1.35rem; }
        .nav-item.active { color: var(--primary); }
        .publish-btn { background: var(--primary); width: 52px; height: 52px; border-radius: 40px; display: flex; align-items: center; justify-content: center; margin-top: -20px; color: white; font-size: 1.4rem; }
        body.dark .top-bar, body.dark .tabs, body.dark .conversation-item, body.dark .chat-input-area, body.dark .bottom-nav, body.dark .notification-item, body.dark .toolbar { background: #13182a; border-color: #2c2e3a; }
        body.dark .chat-messages { background: #0b0e1a; }
        body.dark .message.received { background: #2c2e3a; color: #fff; }
        body.dark .notification-item.unread { background: #1e2a3a; border-left-color: var(--primary); }
        .tabbar { display: none !important; }
        .msg-dot {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #ff3b30;
            border-radius: 20px;
            min-width: 18px;
            height: 18px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: white;
            padding: 0 4px;
            box-sizing: border-box;
            z-index: 10;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
            line-height: 1;
            pointer-events: none;
        }

        body.dark .msg-dot {
            box-shadow: 0 0 0 1px #1e1f2a;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="back-btn" id="topBackBtn"><i class="fas fa-arrow-left"></i></div>
        <div class="top-title" id="topTitle">消息中心</div>
        <div style="width:36px;"></div>
    </div>
    <div class="tabs" id="tabs">
        <div class="tab" data-tab="notify">通知 <span id="notifyBadge" class="badge" style="display: none;">0</span></div>
        <div class="tab" data-tab="chat">私信 <span id="chatBadge" class="badge" style="display: none;">0</span></div>
    </div>
    <div class="scroll-content" id="scrollContent">
        <div id="notifyPanel"></div>
        <div id="chatPanel" style="display:none;">
            <div id="conversationList" class="conversation-list"></div>
            <div id="chatDetail" style="display:none; flex-direction:column; height:100%;"></div>
        </div>
    </div>
    <div class="bottom-nav">
        <div class="nav-item" data-nav="home"><i class="fas fa-home"></i><span>首页</span></div>
        <div class="nav-item" data-nav="explore"><i class="fas fa-planet-ringed"></i><span>广场</span></div>
        <div class="nav-item publish-btn" data-nav="publish"><i class="fas fa-plus"></i></div>
        <div class="nav-item active" data-nav="msg"><i class="far fa-comment"></i><span>消息</span><span id="msgBadge" class="msg-dot" style="display: none;">0</span></div>
        <div class="nav-item" data-nav="mine"><i class="far fa-user"></i><span>我的</span></div>
    </div>
</div>

<script src="js/common.js"></script>
<script>
    // ========== 用户信息缓存 ==========
    const userInfoCache = new Map();
    async function getUserInfoWithCache(userId) {
        if (userInfoCache.has(userId)) return userInfoCache.get(userId);
        try {
            const res = await fetch(`${API_BASE_URL}/api/user/info?studentId=${userId}`);
            if (res.ok) {
                const user = await res.json();
                userInfoCache.set(userId, user);
                return user;
            }
        } catch(e) {}
        return { studentId: userId, nickname: userId, avatar: '' };
    }

    // ========== 私信 API 调用 ==========
    async function getConversations(userId) {
        const res = await fetch(`${API_BASE_URL}/api/message/conversations?userId=${userId}`);
        return await res.json();
    }
    async function getMessages(user1, user2) {
        const res = await fetch(`${API_BASE_URL}/api/message/list?user1=${user1}&user2=${user2}`);
        return await res.json();
    }
    async function sendMessageApi(from, to, content) {
        const formData = new URLSearchParams();
        formData.append('from', from);
        formData.append('to', to);
        formData.append('content', content);
        const res = await fetch(`${API_BASE_URL}/api/message/send`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });
        return await res.json();
    }
    async function markMessagesRead(currentUserId, otherUserId) {
        const formData = new URLSearchParams();
        formData.append('currentUserId', currentUserId);
        formData.append('otherUserId', otherUserId);
        await fetch(`${API_BASE_URL}/api/message/mark-read`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });
    }
    async function getUnreadCount(userId) {
        const res = await fetch(`${API_BASE_URL}/api/message/unread-count?userId=${userId}`);
        const data = await res.json();
        return data.count || 0;
    }
    async function deleteConversationApi(userId, otherUserId) {
        const formData = new URLSearchParams();
        formData.append('userId', userId);
        formData.append('otherUserId', otherUserId);
        const res = await fetch(`${API_BASE_URL}/api/message/delete-conversation`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });
        return await res.json();
    }
    async function deleteAllMessagesApi(userId) {
        const formData = new URLSearchParams();
        formData.append('userId', userId);
        const res = await fetch(`${API_BASE_URL}/api/message/delete-all`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });
        return await res.json();
    }

    let currentChatTarget = null;
    let currentChatName = '';
    let originalBackHandler = null;
    let currentTab = 'notify';

    // ==================== 通知相关 ====================
    async function renderNotifications() {
        const container = document.getElementById('notifyPanel');
        const userId = localStorage.getItem('studentId');
        if (!userId) {
            container.innerHTML = '<div class="empty-state">请先登录</div>';
            return;
        }
        try {
            const res = await fetch(`${API_BASE_URL}/api/notification/list?studentId=${userId}`, { credentials: 'include' });
            if (!res.ok) throw new Error();
            const notifs = await res.json();
            let toolbarHtml = `
                <div class="toolbar">
                    <button class="toolbar-btn" onclick="markAllNotificationsRead()" title="一键已读"><i class="fas fa-check-double"></i></button>
                    <button class="toolbar-btn" onclick="deleteAllNotifications()" title="删除所有"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
            if (!notifs || notifs.length === 0) {
                container.innerHTML = toolbarHtml + '<div class="empty-state">暂无通知</div>';
                return;
            }
            const listHtml = notifs.map(n => {
                const isUnread = !n.isRead;
                const postId = n.postId || 0;
                return `
                    <div class="notification-item ${isUnread ? 'unread' : ''}" data-id="${n.id}">
                        <div class="notification-content" onclick="goToPostDetail(${postId})">
                            <div class="notification-message">${escapeHtml(n.message)}</div>
                            <div class="notification-time">${new Date(n.createTime).toLocaleString()}</div>
                        </div>
                        <div class="notification-actions">
                            ${isUnread ? `<button class="notify-mark-read" onclick="markNotificationRead(${n.id}, this)" title="标记已读"><i class="fas fa-check"></i></button>` : ''}
                            <button class="notify-delete" onclick="deleteNotification(${n.id}, this)" title="删除"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
            container.innerHTML = toolbarHtml + listHtml;
        } catch(e) {
            container.innerHTML = '<div class="empty-state">加载失败</div>';
        }
        await updateNotifyBadge();
    }

    async function markNotificationRead(notificationId, element) {
        const userId = localStorage.getItem('studentId');
        if (!userId) return;
        try {
            const formData = new URLSearchParams();
            formData.append('notificationId', notificationId);
            formData.append('studentId', userId);
            const res = await fetch(API_BASE_URL + '/api/notification/read', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData,
                credentials: 'include'
            });
            const data = await res.json();
            if (data.success) {
                const item = element.closest('.notification-item');
                item.classList.remove('unread');
                const markBtn = item.querySelector('.notify-mark-read');
                if (markBtn) markBtn.remove();
                updateNotifyBadge();
                if (typeof updateMsgBadge === 'function') updateMsgBadge();
            }
        } catch(e) { showToast('操作失败', 'error'); }
    }

    async function markAllNotificationsRead() {
        const userId = localStorage.getItem('studentId');
        if (!userId) return;
        try {
            const formData = new URLSearchParams();
            formData.append('studentId', userId);
            const res = await fetch(API_BASE_URL + '/api/notification/read-all', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData,
                credentials: 'include'
            });
            const data = await res.json();
            if (data.success) {
                renderNotifications();
                updateNotifyBadge();
                if (typeof updateMsgBadge === 'function') updateMsgBadge();
                showToast('已全部标记为已读', 'success');
            }
        } catch(e) { showToast('操作失败', 'error'); }
    }

    async function deleteNotification(notificationId, element) {
        const userId = localStorage.getItem('studentId');
        if (!userId) return;
        try {
            const formData = new URLSearchParams();
            formData.append('notificationId', notificationId);
            formData.append('studentId', userId);
            const res = await fetch(API_BASE_URL + '/api/notification/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData,
                credentials: 'include'
            });
            const data = await res.json();
            if (data.success) {
                element.closest('.notification-item').remove();
                updateNotifyBadge();
                if (typeof updateMsgBadge === 'function') updateMsgBadge();
                showToast('已删除', 'success');
            }
        } catch(e) { showToast('删除失败', 'error'); }
    }

    async function deleteAllNotifications() {
        if (!confirm('确定删除所有通知吗？')) return;
        const userId = localStorage.getItem('studentId');
        if (!userId) return;
        try {
            const res = await fetch(`${API_BASE_URL}/api/notification/list?studentId=${userId}`, { credentials: 'include' });
            const notifs = await res.json();
            for (const n of notifs) {
                await fetch(API_BASE_URL + '/api/notification/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ notificationId: n.id, studentId: userId }),
                    credentials: 'include'
                });
            }
            renderNotifications();
            updateNotifyBadge();
            if (typeof updateMsgBadge === 'function') updateMsgBadge();
            showToast('已清空所有通知', 'success');
        } catch(e) { showToast('操作失败', 'error'); }
    }

    async function updateNotifyBadge() {
        const userId = localStorage.getItem('studentId');
        if (!userId) return;
        try {
            const res = await fetch(`${API_BASE_URL}/api/notification/unread-count?studentId=${userId}`, { credentials: 'include' });
            const data = await res.json();
            const count = data.count || 0;
            const badge = document.getElementById('notifyBadge');
            if (count > 0) {
                badge.innerText = count > 99 ? '99+' : count;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        } catch(e) { console.warn(e); }
    }

    // ==================== 私信相关 ====================
    async function renderConversations() {
        const container = document.getElementById('conversationList');
        const userId = localStorage.getItem('studentId');
        if (!userId) {
            container.innerHTML = '<div class="empty-state">请先登录</div>';
            return;
        }
        const convs = await getConversations(userId);
        let toolbarHtml = `
            <div class="toolbar">
                <button class="toolbar-btn" onclick="markAllChatsRead()" title="一键已读"><i class="fas fa-check-double"></i></button>
                <button class="toolbar-btn" onclick="deleteAllConversations()" title="删除所有"><i class="fas fa-trash-alt"></i></button>
            </div>
        `;
        if (!convs.length) {
            container.innerHTML = toolbarHtml + '<div class="empty-state">暂无私信</div>';
            return;
        }
        // 串行获取用户信息（避免并发请求导致浏览器卡顿）
        const convWithUserInfo = [];
        for (const c of convs) {
            const userInfo = await getUserInfoWithCache(c.userId);
            convWithUserInfo.push({ ...c, nickname: userInfo.nickname || c.userId, avatar: userInfo.avatar });
        }
        const listHtml = convWithUserInfo.map(c => `
            <div class="conversation-item" onclick="openChat('${c.userId}')">
                <div class="conv-avatar">
                    ${c.avatar ? `<img src="${c.avatar}" style="width:48px;height:48px;border-radius:50%;object-fit:cover">` : '<i class="fas fa-user-circle"></i>'}
                </div>
                <div class="conv-info">
                    <div class="conv-name">${escapeHtml(c.nickname)} ${c.unread > 0 ? `<span style="background:#ff3b30; color:white; border-radius:50%; display:inline-block; width:18px; height:18px; text-align:center; line-height:18px; font-size:10px; margin-left:6px;">${c.unread}</span>` : ''}</div>
                    <div class="conv-preview">${escapeHtml(c.lastMessage.substring(0,30))}</div>
                    <div class="conv-time">${new Date(c.lastTime).toLocaleTimeString()}</div>
                </div>
                <button class="delete-conv-btn" onclick="event.stopPropagation(); deleteConversation('${c.userId}')" title="删除对话"><i class="fas fa-trash-alt"></i></button>
            </div>
        `).join('');
        container.innerHTML = toolbarHtml + listHtml;
        updateChatBadge();
    }

    async function openChat(targetId) {
        currentChatTarget = targetId;
        const userInfo = await getUserInfoWithCache(targetId);
        currentChatName = userInfo.nickname || targetId;
        const userId = localStorage.getItem('studentId');
        if (!userId) return;
        await markMessagesRead(userId, targetId);
        const messages = await getMessages(userId, targetId);
        const msgsHtml = messages.map(m => `<div class="message ${m.fromUser === userId ? 'sent' : 'received'}">${escapeHtml(m.content)}</div>`).join('');
        document.getElementById('conversationList').style.display = 'none';
        const chatDetailDiv = document.getElementById('chatDetail');
        chatDetailDiv.style.display = 'flex';
        chatDetailDiv.innerHTML = `
            <div class="chat-messages" id="chatMessages">${msgsHtml || '<div class="empty-chat">暂无消息</div>'}</div>
            <div class="chat-input-area"><input type="text" id="chatInput" class="chat-input" placeholder="输入消息..."><button class="send-btn" onclick="sendChatMessage()">发送</button></div>
        `;
        const msgsDiv = document.getElementById('chatMessages');
        if(msgsDiv) msgsDiv.scrollTop = msgsDiv.scrollHeight;
        document.getElementById('topTitle').innerText = currentChatName;
        const backBtn = document.getElementById('topBackBtn');
        if (!originalBackHandler) originalBackHandler = backBtn.onclick;
        backBtn.onclick = function() { backToList(); };
        renderConversations();
    }

    window.backToList = function() {
        document.getElementById('conversationList').style.display = 'block';
        document.getElementById('chatDetail').style.display = 'none';
        renderConversations();
        document.getElementById('topTitle').innerText = '消息中心';
        const backBtn = document.getElementById('topBackBtn');
        backBtn.onclick = originalBackHandler || function() { goTo('index.html'); };
    };

    window.sendChatMessage = async function() {
        const input = document.getElementById('chatInput');
        const content = input.value.trim();
        if (!content) return;
        const userId = localStorage.getItem('studentId');
        if (!userId) { showToast('请先登录', 'error'); return; }
        const result = await sendMessageApi(userId, currentChatTarget, content);
        if (result.success) {
            input.value = '';
            await openChat(currentChatTarget);
        } else {
            showToast('发送失败', 'error');
        }
    };

    async function updateChatBadge() {
        const userId = localStorage.getItem('studentId');
        if (!userId) return;
        const count = await getUnreadCount(userId);
        const badge = document.getElementById('chatBadge');
        if (count > 0) {
            badge.innerText = count > 99 ? '99+' : count;
            badge.style.display = 'inline-block';
        } else {
            badge.style.display = 'none';
        }
    }

    async function markAllChatsRead() {
        showToast('暂不支持一键已读', 'info');
    }

    // 删除单个对话（已添加 async）
    async function deleteConversation(targetUserId) {
        const userId = localStorage.getItem('studentId');
        if (!userId) return;
        if (typeof showConfirmDialog === 'function') {
            showConfirmDialog(`确定删除与 ${targetUserId} 的私信记录吗？此操作不可恢复。`, async () => {
                const result = await deleteConversationApi(userId, targetUserId);
                if (result.success) {
                    showToast('已删除对话', 'success');
                    renderConversations();
                    if (currentChatTarget === targetUserId) backToList();
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            });
        } else {
            if (confirm(`确定删除与 ${targetUserId} 的私信记录吗？此操作不可恢复。`)) {
                const result = await deleteConversationApi(userId, targetUserId);
                if (result.success) {
                    showToast('已删除对话', 'success');
                    renderConversations();
                    if (currentChatTarget === targetUserId) backToList();
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            }
        }
    }

    // 删除所有私信（已添加 async）
    async function deleteAllConversations() {
        const userId = localStorage.getItem('studentId');
        if (!userId) return;
        if (typeof showConfirmDialog === 'function') {
            showConfirmDialog('确定删除所有私信记录吗？此操作不可恢复。', async () => {
                const result = await deleteAllMessagesApi(userId);
                if (result.success) {
                    showToast('已清空所有私信', 'success');
                    renderConversations();
                    if (document.getElementById('chatDetail').style.display === 'flex') backToList();
                } else {
                    showToast(result.message || '操作失败', 'error');
                }
            });
        } else {
            if (confirm('确定删除所有私信记录吗？此操作不可恢复。')) {
                const result = await deleteAllMessagesApi(userId);
                if (result.success) {
                    showToast('已清空所有私信', 'success');
                    renderConversations();
                    if (document.getElementById('chatDetail').style.display === 'flex') backToList();
                } else {
                    showToast(result.message || '操作失败', 'error');
                }
            }
        }
    }

    window.goToPostDetail = function(postId) {
        if (postId) window.location.href = `post-detail.html?postId=${postId}`;
    };

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
        const notifyPanel = document.getElementById('notifyPanel');
        const chatPanel = document.getElementById('chatPanel');
        if (tab === 'notify') {
            notifyPanel.style.display = 'block';
            chatPanel.style.display = 'none';
            renderNotifications();
            document.getElementById('topTitle').innerText = '消息中心';
        } else {
            notifyPanel.style.display = 'none';
            chatPanel.style.display = 'block';
            renderConversations();
            document.getElementById('topTitle').innerText = '私信';
        }
        if (tab !== 'chat') backToList();
    }

    window.addEventListener('load', () => {
        const studentId = localStorage.getItem('studentId');
        if (!studentId) {
            document.getElementById('conversationList').innerHTML = '<div class="empty-state">请先登录</div>';
            document.getElementById('notifyPanel').innerHTML = '<div class="empty-state">请先登录</div>';
        } else {
            switchTab('notify');
        }
        const backBtn = document.getElementById('topBackBtn');
        originalBackHandler = function() { goTo('index.html'); };
        backBtn.onclick = originalBackHandler;
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.getAttribute('data-tab')));
        });
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('tab') === 'chat') {
            const targetId = urlParams.get('userId');
            const targetName = urlParams.get('name');
            if (targetId) {
                // 切换到私信 tab
                switchTab('chat');
                if (targetName) {
                    currentChatName = decodeURIComponent(targetName);
                }
                // 延迟打开聊天，确保 DOM 渲染完成
                setTimeout(() => openChat(decodeURIComponent(targetId)), 100);
            }
        }
        const navMap = { home: 'index.html', explore: 'help.html', publish: 'publish.html', msg: 'msg.html', mine: 'mine.html' };
        document.querySelectorAll('.nav-item').forEach(nav => {
            const action = nav.getAttribute('data-nav');
            if (action && navMap[action]) nav.addEventListener('click', () => window.location.href = navMap[action]);
        });
        if (typeof updateMsgBadge === 'function') updateMsgBadge();
        setInterval(() => {
            if (currentTab === 'notify') updateNotifyBadge();
            else updateChatBadge();
        }, 30000);
    });
</script>
</body>
