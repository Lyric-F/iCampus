<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>我的订单 - iCampus</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fafcff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-bottom: 20px;
        }
        .app-container {
            max-width: 540px;
            width: 100%;
            margin: 0 auto;
            background: inherit;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            background: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #eef2f6;
            flex-shrink: 0;
        }
        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f7;
            border-radius: 50%;
            cursor: pointer;
        }
        .top-title {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
        }
        /* 选项卡样式 */
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #eef2f6;
            margin-top: 0;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 16px;
            font-weight: 500;
            color: #8e8e93;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .tab.active {
            color: #007aff;
            font-weight: 600;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: #007aff;
            border-radius: 2px;
        }
        body.dark .tabs {
            background: #13182a;
            border-color: #2c2e3a;
        }
        body.dark .tab.active {
            color: #0a84ff;
        }
        body.dark .tab.active::after {
            background: #0a84ff;
        }
        /* 滚动内容区 */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0 80px;
        }
        /* 订单卡片 */
        .order-item {
            background: white;
            border-radius: 28px;
            margin: 0 16px 12px;
            padding: 16px;
            border: 1px solid #eef2f6;
            transition: all 0.2s;
            cursor: pointer;
        }
        .order-item:active {
            transform: scale(0.98);
        }
        body.dark .order-item {
            background: #13182a;
            border-color: #2c2e3a;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .order-type {
            font-weight: 700;
            font-size: 16px;
            padding: 4px 12px;
            background: #f0f2f5;
            border-radius: 20px;
        }
        body.dark .order-type {
            background: #1e253e;
            color: #b3c0e5;
        }
        .order-status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        .order-status.WAITING { background: #fff3e0; color: #f5a623; }
        .order-status.PENDING { background: #fff3e0; color: #f5a623; }
        .order-status.ACCEPTED { background: #e0f7fa; color: #00796b; }
        .order-status.PAID { background: #e8f5e9; color: #2e7d32; }
        .order-status.COMPLETED { background: #e8f5e9; color: #2e7d32; }
        .order-status.CANCELLED { background: #ffebee; color: #c62828; }
        body.dark .order-status.WAITING { background: #2a241f; color: #ffb74d; }
        body.dark .order-status.PENDING { background: #2a241f; color: #ffb74d; }
        body.dark .order-status.ACCEPTED { background: #1a2a2a; color: #4db6ac; }
        body.dark .order-status.PAID { background: #1e2a1e; color: #66bb6a; }
        body.dark .order-status.COMPLETED { background: #1e2a1e; color: #66bb6a; }
        body.dark .order-status.CANCELLED { background: #2a1a1a; color: #ff6b6b; }
        .order-amount {
            font-size: 20px;
            font-weight: 800;
            color: #ff6b2c;
            margin-bottom: 8px;
        }
        .order-time {
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 8px;
        }
        .order-detail {
            font-size: 13px;
            color: #5c6072;
            margin-bottom: 12px;
            line-height: 1.4;
            background: #f9fafc;
            padding: 8px;
            border-radius: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        body.dark .order-detail {
            background: #0f1422;
            color: #9aa9cc;
        }
        .order-actions {
            text-align: right;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .cancel-btn {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }
        .complete-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }
        .delete-btn {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #9ca3af;
        }
        /* 详情模态框 */
        .detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .detail-modal-content {
            max-width: 540px;
            width: 90%;
            background: white;
            border-radius: 32px;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalScale 0.2s ease;
        }
        body.dark .detail-modal-content {
            background: #13182a;
        }
        .detail-header {
            padding: 20px;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: inherit;
            font-weight: 600;
            font-size: 18px;
        }
        .detail-header i {
            cursor: pointer;
            font-size: 24px;
            color: #8e8e93;
        }
        .detail-body {
            padding: 20px;
        }
        .detail-section {
            margin-bottom: 16px;
        }
        .detail-label {
            font-weight: 600;
            margin-bottom: 6px;
            color: #8e8e93;
            font-size: 13px;
        }
        .detail-value {
            font-size: 14px;
            line-height: 1.4;
            color: #1c1c1e;
        }
        body.dark .detail-value {
            color: #eff3fc;
        }
        .dish-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        @keyframes modalScale {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 540px;
            margin: 0 auto;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 20px 24px;
            border-top: 1px solid #eef2f6;
            z-index: 99;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: #9095ae;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item i { font-size: 1.35rem; }
        .nav-item.active { color: var(--primary, #0071e3); font-weight: 600; }
        .publish-btn {
            background: var(--primary, #0071e3);
            width: 52px;
            height: 52px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
            box-shadow: 0 6px 16px rgba(0,113,227,0.2);
            color: white;
            font-size: 1.4rem;
        }
        /* 自定义确认弹窗 */
        .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .custom-modal-content {
            width: 280px;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            animation: modalScale 0.2s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        body.dark .custom-modal-content {
            background: #13182a;
            border: 1px solid #2c2e3a;
        }
        .custom-modal-message {
            padding: 24px 20px;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            color: #1c1c1e;
            border-bottom: 1px solid #eef2f6;
        }
        body.dark .custom-modal-message {
            color: #eff3fc;
            border-color: #2c2e3a;
        }
        .custom-modal-buttons {
            display: flex;
        }
        .custom-modal-btn {
            flex: 1;
            text-align: center;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            background: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .custom-modal-btn.cancel {
            color: #8e8e93;
            border-right: 1px solid #eef2f6;
        }
        .custom-modal-btn.confirm {
            color: #ff3b30;
        }
        .custom-modal-btn:active {
            background: #f5f5f7;
        }
        body.dark .custom-modal-btn.cancel {
            border-color: #2c2e3a;
        }
        body.dark .custom-modal-btn:active {
            background: #2c2e3a;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="back-btn" onclick="goTo('mine.html')"><i class="fas fa-arrow-left"></i></div>
        <div class="top-title">我的订单</div>
    </div>

    <!-- 选项卡 -->
    <div class="tabs">
        <div class="tab active" data-type="run">🏃 跑腿订单</div>
        <div class="tab" data-type="canteen">🍚 食堂订单</div>
    </div>

    <!-- 滚动内容区 -->
    <div class="scroll-content" id="orderListContainer">
        <div class="empty-state">加载中...</div>
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
        <div class="nav-item" data-nav="home"><i class="fas fa-home"></i><span>首页</span></div>
        <div class="nav-item" data-nav="explore"><i class="fas fa-planet-ringed"></i><span>广场</span></div>
        <div class="nav-item publish-btn" data-nav="publish"><i class="fas fa-plus"></i></div>
        <div class="nav-item" data-nav="msg"><i class="far fa-comment"></i><span>消息</span></div>
        <div class="nav-item active" data-nav="mine"><i class="far fa-user"></i><span>我的</span></div>
    </div>
</div>

<!-- 订单详情模态框 -->
<div id="orderDetailModal" class="detail-modal">
    <div class="detail-modal-content">
        <div class="detail-header">
            <span>订单详情</span>
            <i class="fas fa-times" id="closeDetailModal"></i>
        </div>
        <div class="detail-body" id="detailBody"></div>
    </div>
</div>

<!-- 自定义确认弹窗 -->
<div id="customConfirmModal" class="custom-modal" style="display: none;">
    <div class="custom-modal-content">
        <div class="custom-modal-message" id="confirmMessage">确定要删除该订单吗？</div>
        <div class="custom-modal-buttons">
            <button class="custom-modal-btn cancel" id="confirmCancelBtn">否</button>
            <button class="custom-modal-btn confirm" id="confirmOkBtn">是</button>
        </div>
    </div>
</div>

<script src="js/common.js"></script>
<script>
    let currentTab = 'run'; // 'run' 或 'canteen'
    let currentOrders = [];

    // 自定义确认弹窗
    function showConfirmDialog(message, onConfirm, onCancel) {
        const modal = document.getElementById('customConfirmModal');
        const msgSpan = document.getElementById('confirmMessage');
        const okBtn = document.getElementById('confirmOkBtn');
        const cancelBtn = document.getElementById('confirmCancelBtn');

        msgSpan.innerText = message;
        modal.style.display = 'flex';

        const closeModal = () => {
            modal.style.display = 'none';
            okBtn.removeEventListener('click', handleOk);
            cancelBtn.removeEventListener('click', handleCancel);
        };
        const handleOk = () => {
            closeModal();
            if (onConfirm) onConfirm();
        };
        const handleCancel = () => {
            closeModal();
            if (onCancel) onCancel();
        };
        okBtn.addEventListener('click', handleOk);
        cancelBtn.addEventListener('click', handleCancel);
    }

    // 加载订单
    async function loadOrders() {
        const studentId = localStorage.getItem('studentId');
        const container = document.getElementById('orderListContainer');
        if (!container) return;
        if (!studentId) {
            container.innerHTML = '<div class="empty-state">请先登录</div>';
            return;
        }
        try {
            const res = await fetch(`${API_BASE_URL}/api/order/my?studentId=${studentId}`);
            const orders = await res.json();
            if (!orders || orders.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无订单</div>';
                return;
            }
            // 大小写不敏感过滤
            currentOrders = orders.filter(order => {
                const type = order.orderType?.toUpperCase();
                if (currentTab === 'run') return type === 'RUN';
                return type === 'CANTEEN';
            });
            renderOrders();
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="empty-state">加载失败，请重试</div>';
        }
    }

    // 渲染订单列表
    function renderOrders() {
        const container = document.getElementById('orderListContainer');
        if (!container) return;
        if (currentOrders.length === 0) {
            container.innerHTML = `<div class="empty-state">暂无${currentTab === 'run' ? '跑腿' : '食堂'}订单</div>`;
            return;
        }
        const studentId = localStorage.getItem('studentId');
        let html = '';
        currentOrders.forEach(order => {
            const statusText = getStatusText(order.status);
            let brief = '';
            if (currentTab === 'run') {
                try {
                    const details = JSON.parse(order.details);
                    brief = `${details.pickup} → ${details.delivery}`;
                } catch(e) {
                    brief = order.details?.substring(0, 40) || '';
                }
            } else {
                try {
                    const items = JSON.parse(order.details);
                    const itemCount = items.length;
                    brief = `${itemCount}件商品`;
                } catch(e) {
                    brief = order.details?.substring(0, 40) || '';
                }
            }
            html += `
                <div class="order-item" data-order-id="${order.id}" data-order-type="${order.orderType}">
                    <div class="order-header">
                        <span class="order-type">${order.orderType === 'RUN' ? '🏃 跑腿' : '🍚 食堂点餐'}</span>
                        <span class="order-status ${order.status}">${statusText}</span>
                    </div>
                    <div class="order-amount">¥${order.amount}</div>
                    <div class="order-time">${formatRelativeTime(order.createTime)}</div>
                    <div class="order-detail">${escapeHtml(brief)}</div>
                    <div class="order-actions">
                        ${order.status === 'PENDING' ? `<button class="cancel-btn" data-id="${order.id}">取消订单</button>` : ''}
                        ${order.studentId === studentId && order.status === 'ACCEPTED' ? `<button class="complete-btn" data-id="${order.id}">确认送达</button>` : ''}
                        <button class="delete-btn" data-id="${order.id}">删除订单</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        // 绑定取消按钮事件
        document.querySelectorAll('.cancel-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const orderId = btn.getAttribute('data-id');
                showConfirmDialog('确认取消该订单吗？', async () => {
                    await cancelOrder(orderId);
                });
            });
        });
        // 绑定完成按钮事件
        document.querySelectorAll('.complete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const orderId = btn.getAttribute('data-id');
                showConfirmDialog('确认该订单已完成？', async () => {
                    await completeOrder(orderId);
                });
            });
        });
        // 绑定删除按钮事件
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const orderId = btn.getAttribute('data-id');
                showConfirmDialog('⚠️ 删除后将无法恢复，确定要删除该订单吗？', async () => {
                    await deleteOrder(orderId);
                });
            });
        });
        // 绑定卡片点击事件（查看详情）
        document.querySelectorAll('.order-item').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('cancel-btn') || e.target.classList.contains('complete-btn') || e.target.classList.contains('delete-btn')) return;
                const orderId = card.getAttribute('data-order-id');
                const order = currentOrders.find(o => o.id == orderId);
                if (order) showOrderDetail(order);
            });
        });
    }

    // 显示订单详情弹窗
    function showOrderDetail(order) {
        const modal = document.getElementById('orderDetailModal');
        const detailBody = document.getElementById('detailBody');
        if (!modal || !detailBody) return;
        let innerHtml = '';
        if (order.orderType === 'RUN') {
            let details;
            try { details = JSON.parse(order.details); } catch(e) { details = {}; }
            innerHtml = `
                <div class="detail-section"><div class="detail-label">任务类型</div><div class="detail-value">${escapeHtml(details.type || '跑腿')}</div></div>
                <div class="detail-section"><div class="detail-label">取件地点</div><div class="detail-value">${escapeHtml(details.pickup || '—')}</div></div>
                <div class="detail-section"><div class="detail-label">送达地点</div><div class="detail-value">${escapeHtml(details.delivery || '—')}</div></div>
                <div class="detail-section"><div class="detail-label">备注</div><div class="detail-value">${escapeHtml(details.extra || '—')}</div></div>
                <div class="detail-section"><div class="detail-label">联系方式</div><div class="detail-value">${escapeHtml(details.contact || '—')}</div></div>
                <div class="detail-section"><div class="detail-label">报酬</div><div class="detail-value">¥${order.amount}</div></div>
                <div class="detail-section"><div class="detail-label">状态</div><div class="detail-value">${getStatusText(order.status)}</div></div>
                <div class="detail-section"><div class="detail-label">下单时间</div><div class="detail-value">${new Date(order.createTime).toLocaleString()}</div></div>
            `;
        } else {
            let items = [];
            try { items = JSON.parse(order.details); if (!Array.isArray(items)) items = []; } catch(e) { items = []; }
            let itemsHtml = items.length ? '<div class="detail-label">商品清单</div>' + items.map(item => `<div class="dish-item"><span>${escapeHtml(item.name)} x ${item.quantity}</span><span>¥${(item.price * item.quantity).toFixed(2)}</span></div>`).join('') : '<div class="detail-label">商品清单</div><div class="detail-value">无详细商品信息</div>';
            innerHtml = `
                <div class="detail-section"><div class="detail-label">订单类型</div><div class="detail-value">食堂点餐</div></div>
                ${itemsHtml}
                <div class="detail-section"><div class="detail-label">实付金额</div><div class="detail-value">¥${order.amount}</div></div>
                <div class="detail-section"><div class="detail-label">状态</div><div class="detail-value">${getStatusText(order.status)}</div></div>
                <div class="detail-section"><div class="detail-label">下单时间</div><div class="detail-value">${new Date(order.createTime).toLocaleString()}</div></div>
            `;
        }
        detailBody.innerHTML = innerHtml;
        modal.style.display = 'flex';
    }

    // 取消订单
    async function cancelOrder(orderId) {
        const studentId = localStorage.getItem('studentId');
        if (!studentId) return;
        try {
            const formData = new URLSearchParams();
            formData.append('orderId', orderId);
            formData.append('studentId', studentId);
            const res = await fetch(API_BASE_URL + '/api/order/cancel', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                showToast('订单已取消', 'success');
                loadOrders();
            } else {
                showToast(data.message || '取消失败', 'error');
            }
        } catch (e) {
            showToast('网络错误', 'error');
        }
    }

    // 确认送达
    async function completeOrder(orderId) {
        const studentId = localStorage.getItem('studentId');
        if (!studentId) return;
        try {
            const formData = new URLSearchParams();
            formData.append('orderId', orderId);
            formData.append('studentId', studentId);
            const res = await fetch(API_BASE_URL + '/api/order/complete', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                showToast('订单已完成', 'success');
                loadOrders();
            } else {
                showToast(data.message || '操作失败', 'error');
            }
        } catch (e) {
            showToast('网络错误', 'error');
        }
    }

    // 删除订单
    async function deleteOrder(orderId) {
        const studentId = localStorage.getItem('studentId');
        if (!studentId) return;
        try {
            const formData = new URLSearchParams();
            formData.append('orderId', orderId);
            formData.append('studentId', studentId);
            const res = await fetch(API_BASE_URL + '/api/order/delete', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                showToast('订单已删除', 'success');
                loadOrders();
            } else {
                showToast(data.message || '删除失败', 'error');
            }
        } catch (e) {
            showToast('网络错误', 'error');
        }
    }

    function getStatusText(status) {
        const map = {
            'WAITING': '待接单',
            'PENDING': '待接单',
            'ACCEPTED': '进行中',
            'PAID': '已支付',
            'COMPLETED': '已完成',
            'CANCELLED': '已取消'
        };
        return map[status] || status;
    }

    function formatRelativeTime(isoString) {
        if (!isoString) return '';
        const date = new Date(isoString);
        const now = new Date();
        const diff = now - date;
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        if (minutes < 1) return '刚刚';
        if (minutes < 60) return `${minutes}分钟前`;
        if (hours < 24) return `${hours}小时前`;
        if (days < 7) return `${days}天前`;
        return date.toLocaleDateString();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // 选项卡切换
    function bindTabs() {
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const type = tab.getAttribute('data-type');
                if (type === currentTab) return;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = type;
                loadOrders();
            });
        });
    }

    // 底部导航栏点击跳转
    function bindBottomNav() {
        const navMap = { home: 'index.html', explore: 'help.html', publish: 'publish.html', msg: 'msg.html', mine: 'mine.html' };
        document.querySelectorAll('.nav-item').forEach(nav => {
            const action = nav.getAttribute('data-nav');
            if (action && navMap[action]) nav.addEventListener('click', () => window.location.href = navMap[action]);
        });
    }

    // 关闭详情弹窗
    function initModal() {
        const modal = document.getElementById('orderDetailModal');
        const closeBtn = document.getElementById('closeDetailModal');
        closeBtn.addEventListener('click', () => modal.style.display = 'none');
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
    }

    // 监听 localStorage 变化（跨页面刷新）
    window.addEventListener('storage', (e) => {
        if (e.key === 'icampus_need_refresh_orders') {
            loadOrders();
        }
    });

    // 监听页面显示事件（从其他页面返回时）
    window.addEventListener('pageshow', () => {
        loadOrders();
    });

    window.addEventListener('load', () => {
        bindTabs();
        bindBottomNav();
        initModal();
        loadOrders();
        if (typeof updateMsgBadge === 'function') updateMsgBadge();
    });
</script>
</body>
</html>
