<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>代取快递 - iCampus</title>
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fafcff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-bottom: 20px;
    }
    .app-container {
      max-width: 540px;
      width: 100%;
      margin: 0 auto;
      background: inherit;
      position: relative;
    }
    .tabbar { display: none !important; }
    .top-bar {
      background: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #eef2f6;
    }
    body.dark .top-bar { background: #13182a; border-color: #2c2e3a; }
    .back-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f7;
      border-radius: 50%;
      cursor: pointer;
    }
    .top-title {
      flex: 1;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 20px;
      margin: 16px;
      border: 1px solid #eef2f6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    body.dark .card { background: #13182a; border-color: #2c2e3a; }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-item { margin-bottom: 16px; }
    .form-item label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #1c1c1e;
    }
    body.dark .form-item label { color: #b3c0e5; }
    .form-item input, .form-item textarea, .form-item select {
      width: 100%;
      padding: 12px;
      border: 1px solid #eef2f6;
      border-radius: 28px;
      font-size: 14px;
      background: white;
      color: #1c1c1e;
    }
    body.dark .form-item input, body.dark .form-item textarea, body.dark .form-item select {
      background: #1e253e;
      border-color: #2c2e3a;
      color: white;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      cursor: pointer;
      user-select: none;
    }
    .checkbox-group input { width: 18px; height: 18px; margin: 0; cursor: pointer; }
    .btn {
      background: #007aff;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      margin: 16px;
      text-align: center;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.98); }
    body.dark .btn { background: #0a84ff; }
    .package-item {
      background: #f9f9fc;
      border-radius: 24px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #eee;
    }
    .package-index { font-weight: 600; color: #ff7b2c; min-width: 65px; font-size: 14px; }
    .package-size-select { flex: 1; padding: 10px 12px; border: 1px solid #ddd; border-radius: 24px; background: white; font-size: 14px; outline: none; }
    .price-preview {
      background: #fff7f0;
      border-radius: 24px;
      padding: 12px 16px;
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      border: 1px solid #ffe0cc;
    }
    .price-preview .total { font-size: 22px; color: #ff5e2c; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="top-bar">
    <div class="back-btn" onclick="goTo('run.html')"><i class="fas fa-arrow-left"></i></div>
    <div class="top-title">代取快递</div>
  </div>

  <div class="card">
    <div class="card-title"><i class="fas fa-box-open"></i> 取件信息</div>
    <div class="form-item">
      <label>取件码 / 快递单号 <span style="color:red;">*</span></label>
      <input type="text" id="pickupCode" placeholder="例如：3-1-2024 或 订单号后四位">
    </div>
    <div class="form-item">
      <label>快递点位置</label>
      <select id="expressLocation">
        <option>二食堂地下室妈妈驿站</option>
        <option>师范北门菜鸟驿站</option>
        <option>一食堂菜鸟驿站</option>
      </select>
    </div>
    <div class="form-item">
      <label>送到宿舍楼栋 / 具体地址 <span style="color:red;">*</span></label>
      <input type="text" id="dormAddress" placeholder="例如：C6-666">
    </div>
    <div class="form-item">
      <label>联系人+电话 <span style="color:red;">*</span></label>
      <input type="tel" id="userPhone" placeholder="姓名 手机号">
    </div>
  </div>

  <div class="card">
    <div class="card-title"><i class="fas fa-cubes"></i> 组合取件</div>
    <div class="form-item">
      <label>包裹个数</label>
      <div style="display: flex; gap: 8px;">
        <input type="number" id="packageCount" min="1" max="20" value="1" step="1" style="flex:1;">
        <div class="btn" id="generatePackages" style="width: auto; padding: 10px 20px; margin-top:0;">生成列表</div>
      </div>
    </div>
    <div id="packagesContainer" class="package-list"></div>
    <div class="price-preview">
      <span>💰 包裹总价</span>
      <span class="total" id="dynamicPrice">¥0.00</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><i class="fas fa-pen-alt"></i> 附加选项</div>
    <div class="form-item">
      <div class="checkbox-group">
        <label><input type="checkbox" id="urgentCheckbox"> 🔥 急用（加急优先处理）</label>
      </div>
    </div>
    <div class="form-item" id="tipField" style="display: none;">
      <label>额外小费 (元)</label>
      <input type="number" id="tipAmount" value="0" step="1" min="0" placeholder="给跑腿员的小费">
    </div>
    <div class="form-item">
      <label>备注</label>
      <textarea id="remark" rows="2" placeholder="大件/易碎品/特殊需求..."></textarea>
    </div>
  </div>

  <div class="btn" id="submitExpress"><i class="fas fa-bolt"></i> 发布代取任务</div>
</div>
<script src="js/common.js"></script>
<script>
  const priceMap = { small: 2, medium: 3, large: 4 };
  const sizeTextMap = { small: '小件', medium: '中件', large: '大件' };
  const countInput = document.getElementById('packageCount');
  const genBtn = document.getElementById('generatePackages');
  const container = document.getElementById('packagesContainer');
  const totalSpan = document.getElementById('dynamicPrice');
  let packageSelectors = [];

  const urgentCheckbox = document.getElementById('urgentCheckbox');
  const tipField = document.getElementById('tipField');
  const tipInput = document.getElementById('tipAmount');

  urgentCheckbox.addEventListener('change', function() {
    tipField.style.display = this.checked ? 'block' : 'none';
    if (!this.checked) tipInput.value = 0;
  });

  function updateTotal() {
    let total = 0;
    packageSelectors.forEach(sel => total += priceMap[sel.value]);
    totalSpan.innerText = `¥${total}.00`;
    return total;
  }

  function generateList() {
    let count = parseInt(countInput.value);
    if (isNaN(count) || count < 1) count = 1;
    if (count > 20) { count = 20; countInput.value = 20; showToast('单次最多代取20个包裹', 'info'); }
    container.innerHTML = '';
    packageSelectors = [];
    for (let i = 1; i <= count; i++) {
      const div = document.createElement('div');
      div.className = 'package-item';
      div.innerHTML = `
                <span class="package-index">包裹 ${i}</span>
                <select class="package-size-select">
                    <option value="small">小件 · 2元</option>
                    <option value="medium" selected>中件 · 3元</option>
                    <option value="large">大件 · 4元</option>
                </select>
            `;
      const select = div.querySelector('select');
      select.addEventListener('change', updateTotal);
      container.appendChild(div);
      packageSelectors.push(select);
    }
    updateTotal();
  }

  genBtn.addEventListener('click', generateList);
  generateList();

  document.getElementById('submitExpress').addEventListener('click', async function() {
    const studentId = localStorage.getItem('studentId');
    if (!studentId) {
      showToast('请先登录', 'error');
      goTo('login.html');
      return;
    }

    const code = document.getElementById('pickupCode').value.trim();
    const location = document.getElementById('expressLocation').value;
    const address = document.getElementById('dormAddress').value.trim();
    const userPhone = document.getElementById('userPhone').value.trim();
    const remark = document.getElementById('remark').value.trim();
    const urgent = urgentCheckbox.checked;
    let tip = 0;
    if (urgent) {
      tip = parseFloat(tipInput.value);
      if (isNaN(tip)) tip = 0;
    }

    if (!code) { showToast('请填写取件码或快递单号', 'error'); return; }
    if (!address) { showToast('请填写送到宿舍地址', 'error'); return; }
    if (!userPhone) { showToast('请填写联系人电话', 'error'); return; }

    let packagesInfo = [];
    let packageTotal = 0;
    packageSelectors.forEach((sel, idx) => {
      const size = sel.value;
      const price = priceMap[size];
      packageTotal += price;
      packagesInfo.push(`包裹${idx+1}: ${sizeTextMap[size]} (${price}元)`);
    });

    const totalReward = packageTotal + tip;
    const extra = `快递点：${location}，取件码：${code}，包裹明细：${packagesInfo.join('；')}，备注：${remark || "无"}${urgent ? `；🔥急用 + 小费${tip}元` : ''}`;

    const details = JSON.stringify({
      type: "代取快递",
      pickup: location,
      delivery: address,
      extra: extra,
      contact: userPhone,
      urgent: urgent,
      reward: totalReward
    });

    const order = {
      studentId: studentId,
      orderType: 'RUN',
      amount: totalReward,
      details: details
    };

    try {
      const res = await fetch(API_BASE_URL + '/api/order/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
      });
      const data = await res.json();
      if (data.success) {
        showToast('✅ 代取快递任务已发布！', 'success');
        setTimeout(() => goTo('run.html'), 1200);
      } else {
        showToast(data.message || '发布失败', 'error');
      }
    } catch (e) {
      showToast('网络错误，请重试', 'error');
    }
  });
</script>
</body>
</html>
