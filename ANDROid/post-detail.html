<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>帖子详情 - iCampus</title>
    <!-- 防闪烁脚本：在页面渲染前立即应用夜间模式类 -->
    <script>
        (function() {
            try {
                const darkMode = localStorage.getItem('icampus_dark') === 'true';
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                    document.body.classList.add('dark');
                }
            } catch(e) {}
        })();
    </script>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 基础样式 - 使用 CSS 变量，并确保夜间模式立即生效 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-body, #fafcff); font-family: 'Inter', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        body.dark { background: #0a0c15; }
        .app-container { max-width: 540px; width: 100%; margin: 0 auto; background: var(--bg-body, #fafcff); min-height: 100vh; display: flex; flex-direction: column; position: relative; }
        body.dark .app-container { background: #0a0c15; }
        .top-bar { background: var(--bg-card, white); padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-light, #eef2f6); position: sticky; top: 0; z-index: 20; }
        body.dark .top-bar { background: #13182a; border-color: #2c2e3a; }
        .back-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: #f5f5f7; border-radius: 50%; cursor: pointer; color: var(--primary, #007aff); }
        .top-title { flex: 1; font-size: 18px; font-weight: 600; text-align: center; color: var(--text-primary, #1c1c1e); }
        body.dark .top-title { color: #eef3fc; }
        .top-actions { min-width: 36px; text-align: right; }
        .top-actions i { font-size: 20px; cursor: pointer; }
        .scroll-content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
        .post-detail-card { background: var(--bg-card, white); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border-light, #eef2f6); }
        body.dark .post-detail-card { background: #13182a; border-color: #2c2e3a; }
        .post-detail-card.special-post { background: var(--bg-card, white); border-left: 4px solid var(--primary, #007aff); }
        body.dark .post-detail-card.special-post { background: #13182a; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .post-avatar { width: 48px; height: 48px; border-radius: 50%; background: #eef3fc; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .post-info { flex: 1; }
        .post-name { font-weight: 600; font-size: 16px; cursor: pointer; color: var(--text-primary, #1c1c1e); }
        body.dark .post-name { color: #eef3fc; }
        .post-tag { font-size: 11px; background: #eef3fc; padding: 2px 10px; border-radius: 20px; display: inline-block; color: var(--primary, #007aff); margin-left: 8px; }
        .post-time { font-size: 12px; color: var(--text-secondary, #8e8e93); margin-top: 4px; }
        body.dark .post-time { color: #9aa9cc; }
        .post-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary, #1c1c1e); }
        body.dark .post-title { color: #eef3fc; }
        .post-content { font-size: 15px; line-height: 1.5; margin-bottom: 16px; white-space: pre-wrap; color: var(--text-primary, #1c1c1e); }
        body.dark .post-content { color: #eef3fc; }
        .post-actions-bar { display: flex; justify-content: space-around; padding: 12px 0 0; border-top: 1px solid var(--border-light, #eef2f6); margin-top: 8px; }
        body.dark .post-actions-bar { border-color: #2c2e3a; }
        .action-icon-btn { background: none; border: none; font-size: 22px; color: #8e8e93; cursor: pointer; padding: 6px 16px; border-radius: 30px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .action-icon-btn.liked, .action-icon-btn.disliked { color: #ff3b30; }
        .action-icon-btn.favorited { color: #ff9500; }
        .view-count-display { font-size: 14px; color: var(--primary, #007aff); display: flex; align-items: center; gap: 6px; }
        .comments-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .comments-header h3 { color: var(--text-primary, #1c1c1e); }
        body.dark .comments-header h3 { color: #eef3fc; }
        .comments-list { display: flex; flex-direction: column; gap: 20px; }
        .comment-item { background: var(--bg-card, white); border-radius: 20px; padding: 16px; border: 1px solid var(--border-light, #eef2f6); }
        body.dark .comment-item { background: #13182a; border-color: #2c2e3a; }
        .comment-header { display: flex; gap: 10px; margin-bottom: 10px; }
        .comment-avatar { width: 36px; height: 36px; border-radius: 50%; background: #eef3fc; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        .comment-nickname { font-weight: 600; font-size: 14px; cursor: pointer; color: var(--text-primary, #1c1c1e); }
        body.dark .comment-nickname { color: #eef3fc; }
        .poster-badge { background: var(--primary, #007aff); color: white; font-size: 10px; padding: 2px 8px; border-radius: 12px; margin-left: 6px; }
        .reply-to { font-size: 12px; color: var(--primary, #007aff); margin-bottom: 6px; }
        .comment-content { font-size: 14px; margin-bottom: 12px; color: var(--text-primary, #1c1c1e); }
        body.dark .comment-content { color: #eef3fc; }
        .comment-actions { display: flex; gap: 20px; font-size: 13px; }
        .comment-action { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #8e8e93; }
        .comment-action.liked, .comment-action.disliked { color: #ff3b30; }
        .replies-container { margin-top: 16px; padding-left: 20px; border-left: 2px solid var(--border-light, #eef2f6); }
        body.dark .replies-container { border-color: #2c2e3a; }
        .bottom-input-bar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 540px; margin: 0 auto; background: var(--bg-card, white); border-top: 1px solid var(--border-light, #eef2f6); padding: 10px 16px 20px; display: flex; gap: 12px; z-index: 100; }
        body.dark .bottom-input-bar { background: #13182a; border-color: #2c2e3a; }
        .bottom-input-bar input { flex: 1; border: 1px solid var(--border-light, #ddd); border-radius: 30px; padding: 12px 16px; outline: none; background: #f5f5f7; color: var(--text-primary, #1c1c1e); }
        body.dark .bottom-input-bar input { background: #2a2e42; border-color: #3a405a; color: #eef3fc; }
        .bottom-input-bar button { background: var(--primary, #007aff); color: white; border: none; border-radius: 30px; padding: 10px 20px; cursor: pointer; }
        /* 骨架屏样式 - 日间浅色，夜间深色（防闪烁） */
        .skeleton {
            background: linear-gradient(90deg, #e9ecef 25%, #f8f9fa 50%, #e9ecef 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 16px;
        }
        body.dark .skeleton {
            background: linear-gradient(90deg, #2c2e3a 25%, #3a405a 50%, #2c2e3a 75%);
            background-size: 200% 100%;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary, #8e8e93); }
        /* 特殊帖子样式 */
        .post-detail-card.special-post {
            background: var(--bg-card, white);
            border-radius: 0;
            border: none;
            padding: 24px 20px;
            margin-bottom: 0;
            box-shadow: none;
        }
        body.dark .post-detail-card.special-post {
            background: #13182a;
        }
        .special-post .post-title {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.3;
            margin: 16px 0 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--primary, #007aff);
            display: inline-block;
        }
        .special-post .post-content {
            font-size: 17px;
            line-height: 1.6;
            color: var(--text-primary, #2c3e50);
            margin: 20px 0;
            background: #f8fafc;
            padding: 20px;
            border-radius: 24px;
        }
        body.dark .special-post .post-content {
            background: #1e2a3a;
            color: #eef3fc;
        }
        .special-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light, #eef2f6);
            font-size: 14px;
            color: var(--text-secondary, #5b677b);
        }
        body.dark .special-meta { border-color: #2c2e3a; color: #9aa9cc; }
        .special-meta .left { display: flex; gap: 20px; }
        .special-meta .right { display: flex; gap: 20px; }
        .special-meta i { margin-right: 6px; color: var(--primary, #007aff); }
        .special-actions-bar {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            margin-top: 20px;
        }
        .special-actions-bar .action-icon-btn {
            background: #f0f2f5;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 16px;
            gap: 8px;
        }
        body.dark .special-actions-bar .action-icon-btn { background: #2c2e3a; }
        /* 图片区域 */
        .post-images {
            display: flex;
            gap: 8px;
            margin: 12px 0;
            overflow-x: auto;
            scrollbar-width: thin;
        }
        .post-image-item {
            flex-shrink: 0;
            width: 100px;
            height: 100px;
            border-radius: 12px;
            overflow: hidden;
            background: #f0f0f0;
        }
        .post-image-item img { width: 100%; height: 100%; object-fit: cover; }
        .image-count-badge {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 12px;
        }
        .detail-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0;
        }
        .detail-image-item {
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            background: #f0f0f0;
        }
        .detail-image-item img { width: 100%; height: 100%; object-fit: cover; }
        body.dark .post-image-item,
        body.dark .detail-image-item {
            background: #2c2e3a;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
        <div class="top-title">帖子详情</div>
        <div class="top-actions" id="topActions"></div>
    </div>
    <div class="scroll-content" id="scrollContent">
        <div id="skeleton">
            <div class="post-detail-card"><div class="skeleton" style="height:60px; margin-bottom:16px;"></div><div class="skeleton" style="height:24px; width:80%; margin-bottom:12px;"></div><div class="skeleton" style="height:100px; margin-bottom:16px;"></div><div class="skeleton" style="height:40px;"></div></div>
            <div class="skeleton" style="height:80px; margin-bottom:12px;"></div><div class="skeleton" style="height:120px;"></div>
        </div>
        <div id="realContent" style="display:none;"></div>
    </div>
    <div class="bottom-input-bar">
        <input type="text" id="globalCommentInput" placeholder="写下你的评论...">
        <button id="submitCommentBtn">发布</button>
    </div>
</div>
<script src="js/common.js"></script>
<script>
    // 存储KEY
    const STORAGE_FOLLOW = "icampus_follow_data";
    const STORAGE_HISTORY = "icampus_browse_history";
    let currentPost = null;
    let currentPostId = null;
    let currentStudentId = null;
    let currentReplyCommentId = null;
    let currentReplyNickname = null;
    let isAdmin = false;

    function initStorage() {
        if (!localStorage.getItem(STORAGE_FOLLOW)) localStorage.setItem(STORAGE_FOLLOW, JSON.stringify({}));
        if (!localStorage.getItem(STORAGE_HISTORY)) localStorage.setItem(STORAGE_HISTORY, JSON.stringify({}));
    }

    function getUrlParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
    }

    function addToBrowseHistory(postId) {
        if (!currentStudentId) return;
        let history = JSON.parse(localStorage.getItem(STORAGE_HISTORY) || '{}');
        let userHistory = history[currentStudentId] || [];
        userHistory = userHistory.filter(id => id !== postId);
        userHistory.unshift(postId);
        if (userHistory.length > 50) userHistory.pop();
        history[currentStudentId] = userHistory;
        localStorage.setItem(STORAGE_HISTORY, JSON.stringify(history));
    }

    async function checkAdmin() {
        const studentId = localStorage.getItem('studentId');
        if (!studentId) return false;
        try {
            const res = await fetch(`${window.API_BASE_URL || ''}/api/user/info?studentId=${studentId}`);
            const user = await res.json();
            isAdmin = (user.role === 'ADMIN');
            return isAdmin;
        } catch(e) { console.warn('获取管理员权限失败', e); return false; }
    }

    function setTopActionIcon() {
        const container = document.getElementById('topActions');
        if (!container) return;
        if (isAdmin) {
            container.innerHTML = '<i class="fas fa-trash-alt" style="color:#ff3b30;" onclick="deleteCurrentPost()"></i>';
        } else {
            container.innerHTML = '';
        }
    }

    window.deleteCurrentPost = async function() {
        if (!currentStudentId) { showToast('请先登录', 'error'); return; }
        if (typeof showConfirmDialog === 'function') {
            showConfirmDialog('确定要删除此帖子吗？删除后不可恢复。', async () => { await performDelete(); });
        } else {
            if (confirm('确定要删除此帖子吗？删除后不可恢复。')) { await performDelete(); }
        }
    };

    async function performDelete() {
        try {
            const formData = new URLSearchParams();
            formData.append('studentId', currentStudentId);
            formData.append('postId', currentPostId);
            const res = await fetch(API_BASE_URL + '/api/post/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                showToast('删除成功', 'success');
                setTimeout(() => { window.history.back(); }, 1000);
            } else {
                showToast(data.message || '删除失败', 'error');
            }
        } catch(e) { showToast('网络错误', 'error'); }
    }

    window.sharePost = function() {
        navigator.clipboard.writeText(window.location.href);
        showToast('链接已复制', 'success');
    };

    async function fetchPostDetail() {
        if (!currentPostId) return;
        try {
            const url = `/api/post/detail?postId=${currentPostId}&studentId=${currentStudentId || ''}`;
            const res = await fetch(API_BASE_URL + url);
            if (!res.ok) throw new Error('获取帖子失败');
            const post = await res.json();
            currentPost = post;
            renderPostDetail();
            addToBrowseHistory(currentPostId);
        } catch(e) {
            document.getElementById('realContent').innerHTML = '<div class="empty-state">加载失败，请稍后重试</div>';
        }
    }

    async function fetchComments() {
        if (!currentPostId) return;
        try {
            const url = `/api/post/comments?postId=${currentPostId}&studentId=${currentStudentId || ''}`;
            const res = await fetch(API_BASE_URL + url);
            const comments = await res.json();
            renderComments(comments);
        } catch(e) {
            const container = document.getElementById('commentsContainer');
            if (container) container.innerHTML = '<div class="empty-state">加载评论失败</div>';
        }
    }

    function getViewCount(post) {
        if (post.viewCount && post.viewCount > 0) return post.viewCount;
        const key = `post_view_${post.id}`;
        let views = localStorage.getItem(key);
        if (!views) {
            views = Math.floor(Math.random() * 1900) + 100;
            localStorage.setItem(key, views);
        }
        return parseInt(views);
    }

    function renderPostDetail() {
        if (!currentPost) return;
        const isSpecial = (currentPost.type === '校园公告' || currentPost.type === '活动报名');
        const avatarHtml = currentPost.avatar ? `<img src="${currentPost.avatar.startsWith('http') ? currentPost.avatar : API_BASE_URL + currentPost.avatar}" style="width:100%;height:100%;object-fit:cover">` : `<i class="fas fa-user-circle"></i>`;

        let imagesHtml = '';
        if (currentPost.imageList && currentPost.imageList.length) {
            imagesHtml = `<div class="detail-images">`;
            currentPost.imageList.forEach(url => {
                const fullUrl = url.startsWith('http') ? url : API_BASE_URL + url;
                imagesHtml += `<div class="detail-image-item"><img src="${fullUrl}" loading="lazy"></div>`;
            });
            imagesHtml += `</div>`;
        }

        let actionsHtml = '';
        if (isSpecial) {
            const viewCount = getViewCount(currentPost);
            actionsHtml = `
            <div class="special-meta">
                <div class="left">
                    <span><i class="fas fa-building"></i> ${escapeHtml(currentPost.nickname || currentPost.studentId)}</span>
                    <span><i class="far fa-calendar-alt"></i> ${formatRelativeTime(currentPost.createTime)}</span>
                </div>
                <div class="right">
                    <span><i class="fas fa-eye"></i> ${viewCount} 次浏览</span>
                </div>
            </div>
            <div class="special-actions-bar">
                <button class="action-icon-btn" id="favoritePostBtn" onclick="favoritePostAction()"><i class="far fa-star"></i> 收藏</button>
                <button class="action-icon-btn" onclick="sharePost()"><i class="fas fa-share-alt"></i> 转发</button>
            </div>
        `;
        } else {
            const likeClass = currentPost.userLiked ? 'liked' : '';
            const dislikeClass = currentPost.userDisliked ? 'disliked' : '';
            actionsHtml = `
            <div class="post-actions-bar">
                <button class="action-icon-btn ${likeClass}" id="likePostBtn" onclick="likePostAction()"><i class="far fa-thumbs-up"></i></button>
                <button class="action-icon-btn ${dislikeClass}" id="dislikePostBtn" onclick="dislikePostAction()"><i class="far fa-thumbs-down"></i></button>
                <button class="action-icon-btn" id="favoritePostBtn" onclick="favoritePostAction()"><i class="far fa-star"></i></button>
                <button class="action-icon-btn" onclick="sharePost()"><i class="fas fa-share-alt"></i></button>
            </div>
        `;
        }

        const commentsHtml = isSpecial ? '' : `
        <div class="comments-header"><h3>评论 <span id="commentCount">${currentPost.commentCount || 0}</span></h3></div>
        <div id="commentsContainer" class="comments-list"></div>
    `;

        const html = `
        <div class="post-detail-card ${isSpecial ? 'special-post' : ''}">
            <div class="post-header">
                <div class="post-avatar" onclick="showUserCard('${currentPost.studentId}', '${escapeHtml(currentPost.nickname || currentPost.studentId)}', '${currentPost.avatar || ''}')">${avatarHtml}</div>
                <div class="post-info">
                    <div><span class="post-name" onclick="showUserCard('${currentPost.studentId}', '${escapeHtml(currentPost.nickname || currentPost.studentId)}', '${currentPost.avatar || ''}')">${escapeHtml(currentPost.nickname || currentPost.studentId)}</span><span class="post-tag">#${escapeHtml(currentPost.type)}</span></div>
                    ${!isSpecial ? `<div class="post-time">${formatRelativeTime(currentPost.createTime)}</div>` : ''}
                </div>
            </div>
            <div class="post-title">${escapeHtml(currentPost.title)}</div>
            <div class="post-content">${escapeHtml(currentPost.content)}</div>
            ${imagesHtml}
            ${actionsHtml}
        </div>
        ${commentsHtml}
    `;

        document.getElementById('skeleton').style.display = 'none';
        const realContainer = document.getElementById('realContent');
        realContainer.style.display = 'block';
        realContainer.innerHTML = html;

        if (!isSpecial) fetchComments();
        setTimeout(() => checkFavoriteStatus(), 100);
        const bottomBar = document.querySelector('.bottom-input-bar');
        if (bottomBar) bottomBar.style.display = isSpecial ? 'none' : 'flex';
    }

    window.favoritePostAction = async function() {
        if (!currentStudentId) { showToast('请先登录', 'error'); return; }
        try {
            const formData = new URLSearchParams();
            formData.append('studentId', currentStudentId);
            formData.append('postId', currentPostId);
            const res = await fetch(API_BASE_URL + '/api/favorite/toggle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                const btn = document.getElementById('favoritePostBtn');
                if (data.favorited) {
                    btn.classList.add('favorited');
                    showToast('已收藏', 'success');
                } else {
                    btn.classList.remove('favorited');
                    showToast('已取消收藏', 'success');
                }
            } else {
                showToast(data.message || '操作失败', 'error');
            }
        } catch(e) { showToast('网络错误', 'error'); }
    };

    async function checkFavoriteStatus() {
        if (!currentStudentId || !currentPostId) return;
        let retries = 0;
        while (!document.getElementById('favoritePostBtn') && retries < 10) {
            await new Promise(r => setTimeout(r, 100));
            retries++;
        }
        try {
            const res = await fetch(`${API_BASE_URL}/api/favorite/check?studentId=${currentStudentId}&postId=${currentPostId}`);
            const data = await res.json();
            const btn = document.getElementById('favoritePostBtn');
            if (btn) {
                if (data.favorited) btn.classList.add('favorited');
                else btn.classList.remove('favorited');
            }
        } catch(e) { console.warn(e); }
    }

    function renderComments(comments) {
        const container = document.getElementById('commentsContainer');
        if (!comments || comments.length === 0) {
            container.innerHTML = '<div class="empty-state">暂无评论，快来抢沙发~</div>';
            return;
        }
        container.innerHTML = renderCommentTree(comments);
        bindCommentEvents();
    }

    function renderCommentTree(comments, level = 0) {
        if (!comments || comments.length === 0) return '';
        let html = '';
        comments.forEach(comment => {
            const avatarHtml = comment.userAvatar ? `<img src="${comment.userAvatar.startsWith('http') ? comment.userAvatar : API_BASE_URL + comment.userAvatar}" style="width:100%;height:100%;object-fit:cover">` : `<i class="fas fa-user-circle"></i>`;
            const posterBadge = comment.isPoster ? '<span class="poster-badge">帖主</span>' : '';
            const replyToHtml = comment.replyToNickname ? `<div class="reply-to">回复 @${escapeHtml(comment.replyToNickname)}</div>` : '';
            const likeClass = comment.userLiked ? 'comment-action liked' : 'comment-action';
            const dislikeClass = comment.userDisliked ? 'comment-action disliked' : 'comment-action';
            html += `
                <div class="comment-item" data-comment-id="${comment.id}">
                    <div class="comment-header">
                        <div class="comment-avatar" onclick="showUserCard('${comment.studentId}', '${escapeHtml(comment.userNickname || comment.studentId)}', '${comment.userAvatar || ''}')">${avatarHtml}</div>
                        <div class="comment-author">
                            <div><span class="comment-nickname" onclick="showUserCard('${comment.studentId}', '${escapeHtml(comment.userNickname || comment.studentId)}', '${comment.userAvatar || ''}')">${escapeHtml(comment.userNickname || comment.studentId)}</span>${posterBadge}</div>
                            <div class="comment-time">${formatRelativeTime(comment.createTime)}</div>
                        </div>
                    </div>
                    ${replyToHtml}
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                    <div class="comment-actions">
                        <span class="${likeClass}" data-comment-id="${comment.id}" data-action="like"><i class="far fa-thumbs-up"></i> <span class="like-count">${comment.likeCount || 0}</span></span>
                        <span class="${dislikeClass}" data-comment-id="${comment.id}" data-action="dislike"><i class="far fa-thumbs-down"></i> <span class="dislike-count">${comment.dislikeCount || 0}</span></span>
                        <span class="comment-action" data-comment-id="${comment.id}" data-nickname="${escapeHtml(comment.userNickname || comment.studentId)}" data-action="reply"><i class="far fa-comment"></i> 回复</span>
                    </div>
            `;
            if (comment.replies && comment.replies.length > 0) {
                html += `<div class="replies-container">${renderCommentTree(comment.replies, level + 1)}</div>`;
            }
            html += `</div>`;
        });
        return html;
    }

    function bindCommentEvents() {
        const container = document.getElementById('commentsContainer');
        if (!container) return;
        container.removeEventListener('click', handleCommentClick);
        container.addEventListener('click', handleCommentClick);
    }

    function handleCommentClick(e) {
        const target = e.target.closest('[data-action]');
        if (!target) return;
        const action = target.getAttribute('data-action');
        const commentId = parseInt(target.getAttribute('data-comment-id'));
        if (action === 'reply') {
            e.preventDefault();
            const nickname = target.getAttribute('data-nickname') || '用户';
            currentReplyCommentId = commentId;
            currentReplyNickname = nickname;
            const input = document.getElementById('globalCommentInput');
            input.value = `@${nickname} `;
            input.focus();
        } else if (action === 'like') {
            e.preventDefault();
            handleCommentLike(commentId, target);
        } else if (action === 'dislike') {
            e.preventDefault();
            handleCommentDislike(commentId, target);
        }
    }

    async function handleCommentLike(commentId, btnElement) {
        if (!currentStudentId) { showToast('请先登录', 'error'); return; }
        const formData = new URLSearchParams();
        formData.append('studentId', currentStudentId);
        formData.append('commentId', commentId);
        try {
            const res = await fetch(API_BASE_URL + '/api/post/comment/like', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                const likeSpan = btnElement.querySelector('.like-count');
                if (likeSpan) likeSpan.innerText = data.likeCount;
                btnElement.classList.add('liked');
                const parent = btnElement.closest('.comment-actions');
                const dislikeBtn = parent.querySelector('[data-action="dislike"]');
                if (dislikeBtn && dislikeBtn.classList.contains('disliked')) {
                    dislikeBtn.classList.remove('disliked');
                    const dislikeSpan = dislikeBtn.querySelector('.dislike-count');
                    if (dislikeSpan) dislikeSpan.innerText = data.dislikeCount;
                }
            } else { showToast(data.message || '操作失败', 'error'); }
        } catch(e) { showToast('网络错误', 'error'); }
    }

    async function handleCommentDislike(commentId, btnElement) {
        if (!currentStudentId) { showToast('请先登录', 'error'); return; }
        const formData = new URLSearchParams();
        formData.append('studentId', currentStudentId);
        formData.append('commentId', commentId);
        try {
            const res = await fetch(API_BASE_URL + '/api/post/comment/dislike', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                const dislikeSpan = btnElement.querySelector('.dislike-count');
                if (dislikeSpan) dislikeSpan.innerText = data.dislikeCount;
                btnElement.classList.add('disliked');
                const parent = btnElement.closest('.comment-actions');
                const likeBtn = parent.querySelector('[data-action="like"]');
                if (likeBtn && likeBtn.classList.contains('liked')) {
                    likeBtn.classList.remove('liked');
                    const likeSpan = likeBtn.querySelector('.like-count');
                    if (likeSpan) likeSpan.innerText = data.likeCount;
                }
            } else { showToast(data.message || '操作失败', 'error'); }
        } catch(e) { showToast('网络错误', 'error'); }
    }

    window.submitComment = async function() {
        if (!currentStudentId) { showToast('请先登录', 'error'); goTo('login.html'); return; }
        const input = document.getElementById('globalCommentInput');
        let content = input.value.trim();
        if (!content) { showToast('内容不能为空', 'error'); return; }
        let parentId = null;
        if (currentReplyCommentId && currentReplyNickname) {
            parentId = currentReplyCommentId;
            const atPrefix = `@${currentReplyNickname} `;
            if (content.startsWith(atPrefix)) content = content.substring(atPrefix.length).trim();
            if (!content) { showToast('请填写回复内容', 'error'); return; }
        }
        const formData = new URLSearchParams();
        formData.append('studentId', currentStudentId);
        formData.append('postId', currentPostId);
        formData.append('content', content);
        if (parentId) formData.append('parentId', parentId);
        try {
            const res = await fetch(API_BASE_URL + '/api/post/comment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                showToast(parentId ? '回复成功' : '评论成功', 'success');
                input.value = '';
                currentReplyCommentId = null;
                currentReplyNickname = null;
                fetchComments();
                fetchPostDetail();
            } else {
                showToast(data.message || '操作失败', 'error');
            }
        } catch(e) { showToast('网络错误', 'error'); }
    };

    window.likePostAction = async function() {
        if (!currentStudentId) { showToast('请先登录', 'error'); return; }
        const formData = new URLSearchParams();
        formData.append('studentId', currentStudentId);
        formData.append('postId', currentPostId);
        try {
            const res = await fetch(API_BASE_URL + '/api/post/like', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData });
            const data = await res.json();
            if (data.success) {
                const likeBtn = document.getElementById('likePostBtn');
                const dislikeBtn = document.getElementById('dislikePostBtn');
                if (data.liked) {
                    likeBtn.classList.add('liked');
                    if (dislikeBtn.classList.contains('disliked')) dislikeBtn.classList.remove('disliked');
                } else { likeBtn.classList.remove('liked'); }
                currentPost.likeCount = data.likeCount;
                currentPost.dislikeCount = data.dislikeCount;
                currentPost.userLiked = data.liked;
                currentPost.userDisliked = false;
            } else { showToast(data.message || '操作失败', 'error'); }
        } catch(e) { showToast('网络错误', 'error'); }
    };

    window.dislikePostAction = async function() {
        if (!currentStudentId) { showToast('请先登录', 'error'); return; }
        const formData = new URLSearchParams();
        formData.append('studentId', currentStudentId);
        formData.append('postId', currentPostId);
        try {
            const res = await fetch(API_BASE_URL + '/api/post/dislike', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData });
            const data = await res.json();
            if (data.success) {
                const dislikeBtn = document.getElementById('dislikePostBtn');
                const likeBtn = document.getElementById('likePostBtn');
                if (data.disliked) {
                    dislikeBtn.classList.add('disliked');
                    if (likeBtn.classList.contains('liked')) likeBtn.classList.remove('liked');
                } else { dislikeBtn.classList.remove('disliked'); }
                currentPost.dislikeCount = data.dislikeCount;
                currentPost.likeCount = data.likeCount;
                currentPost.userDisliked = data.disliked;
                currentPost.userLiked = false;
            } else { showToast(data.message || '操作失败', 'error'); }
        } catch(e) { showToast('网络错误', 'error'); }
    };

    window.showUserCard = function(userId, nickname, avatar) {
        if (!currentStudentId) { showToast('请先登录', 'error'); return; }
        const followed = isFollowing(currentStudentId, userId);
        let modal = document.getElementById('userModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'userModal';
            modal.className = 'user-modal-overlay';
            modal.innerHTML = '<div class="user-card" id="userCardContent"></div>';
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
        }
        const container = document.getElementById('userCardContent');
        container.innerHTML = `
            <div class="user-card-avatar">${avatar ? `<img src="${avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : '<i class="fas fa-user-circle"></i>'}</div>
            <div class="user-card-name">${escapeHtml(nickname)}</div>
            <div class="user-card-id">学号: ${userId}</div>
            <div class="user-card-buttons">
                <button class="${followed ? 'btn-unfollow' : 'btn-follow'}" onclick="handleFollowAction('${userId}')">${followed ? '取消关注' : '关注'}</button>
                <button class="btn-chat" onclick="goToChat('${userId}', '${escapeHtml(nickname)}')">发私信</button>
            </div>
        `;
        modal.style.display = 'flex';
    };

    function isFollowing(currentUserId, targetUserId) {
        const data = JSON.parse(localStorage.getItem(STORAGE_FOLLOW) || "{}");
        return data[currentUserId]?.following?.includes(targetUserId) || false;
    }

    window.handleFollowAction = function(targetId) {
        const data = JSON.parse(localStorage.getItem(STORAGE_FOLLOW) || "{}");
        if (!data[currentStudentId]) data[currentStudentId] = { following: [], followers: [] };
        if (!data[targetId]) data[targetId] = { following: [], followers: [] };
        if (isFollowing(currentStudentId, targetId)) {
            data[currentStudentId].following = data[currentStudentId].following.filter(id => id !== targetId);
            data[targetId].followers = data[targetId].followers.filter(id => id !== currentStudentId);
            showToast('已取消关注', 'success');
        } else {
            data[currentStudentId].following.push(targetId);
            data[targetId].followers.push(currentStudentId);
            showToast('已关注', 'success');
        }
        localStorage.setItem(STORAGE_FOLLOW, JSON.stringify(data));
        document.getElementById('userModal').style.display = 'none';
    };

    window.goToChat = function(userId, nickname) {
        sessionStorage.setItem('chatTargetId', userId);
        sessionStorage.setItem('chatTargetName', nickname);
        window.location.href = 'msg.html?tab=chat';
    };

    window.goBack = function() { window.history.back(); };

    async function init() {
        initStorage();
        currentStudentId = localStorage.getItem('studentId');
        currentPostId = parseInt(getUrlParam('postId'));
        if (!currentPostId) {
            document.getElementById('skeleton').style.display = 'none';
            document.getElementById('realContent').innerHTML = '<div class="empty-state">帖子不存在</div>';
            return;
        }
        await checkAdmin();
        setTopActionIcon();
        await fetchPostDetail();
        const submitBtn = document.getElementById('submitCommentBtn');
        if (submitBtn) {
            submitBtn.removeEventListener('click', window.submitComment);
            submitBtn.addEventListener('click', window.submitComment);
        }
    }

    window.addEventListener('pageshow', function(event) {
        if (event.persisted || document.visibilityState === 'visible') {
            if (currentPostId && currentStudentId && document.getElementById('favoritePostBtn')) {
                checkFavoriteStatus();
            }
        }
    });

    document.addEventListener('DOMContentLoaded', init);
</script>
