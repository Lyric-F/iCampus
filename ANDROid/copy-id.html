<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>证件复印 - iCampus</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <style>
        /* ========== 原有所有样式（完整保留） ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f5f7fb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #1f2937; }
        .print-nav { position: sticky; top: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #f0f0f0; z-index: 10; }
        .print-nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #2c3e50; cursor: pointer; border-radius: 50%; background: #f0f2f5; }
        .print-nav-title { font-size: 18px; font-weight: 600; color: #1e293b; }
        .print-nav-right { width: 32px; }
        .card { background: white; margin: 16px; border-radius: 24px; padding: 18px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid #edf2f7; }
        .section-title { font-size: 16px; font-weight: 600; color: #0f172a; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: #3b82f6; }
        .id-types { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 8px; }
        .id-type-item { background: #f8fafc; border-radius: 40px; padding: 10px 0; text-align: center; font-size: 14px; font-weight: 500; color: #334155; cursor: pointer; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .id-type-item.active { background: #2c6e9e; color: white; border-color: #2c6e9e; }
        .option-group { margin-top: 20px; }
        .option-label { font-size: 14px; font-weight: 500; color: #1e293b; margin-bottom: 10px; }
        .option-buttons { display: flex; gap: 16px; }
        .option-btn { flex: 1; text-align: center; padding: 10px; background: #f1f5f9; border-radius: 60px; font-size: 14px; font-weight: 500; color: #334155; cursor: pointer; transition: 0.2s; }
        .option-btn.active { background: #2c6e9e; color: white; }
        .quantity-control { display: flex; align-items: center; gap: 20px; background: #f1f5f9; border-radius: 60px; padding: 6px 16px; width: fit-content; }
        .quantity-btn { width: 36px; height: 36px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; color: #2c6e9e; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .quantity-number { font-size: 18px; font-weight: 600; min-width: 40px; text-align: center; }
        .btn-primary { background: #2c6e9e; color: white; border: none; padding: 12px; border-radius: 60px; font-weight: 600; font-size: 15px; width: 100%; margin-top: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary:active { background: #1f5983; }
        .task-list { margin-top: 10px; }
        .task-item { background: #f9fafc; border-radius: 20px; padding: 14px; margin-bottom: 12px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; border: 1px solid #eef2f6; }
        .task-info { flex: 3; }
        .task-name { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
        .task-detail { font-size: 12px; color: #5b6e8c; display: flex; gap: 12px; flex-wrap: wrap; }
        .task-price { font-weight: 600; color: #e67e22; }
        .delete-task { color: #f97373; background: #fff0f0; width: 32px; height: 32px; border-radius: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .payment-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #eff3f8; padding: 12px 20px 22px; display: flex; align-items: center; justify-content: space-between; z-index: 20; }
        .total-price { font-size: 24px; font-weight: 700; color: #e67e22; }
        .confirm-btn { background: #2c6e9e; padding: 12px 28px; border-radius: 40px; color: white; font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .warning-text { font-size: 12px; color: #9ca3af; margin-top: 16px; padding: 12px; background: #fef9e3; border-radius: 16px; line-height: 1.4; }
        .empty-tasks { text-align: center; padding: 30px; color: #94a3b8; }
        .toast-message { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 20px; border-radius: 40px; font-size: 13px; z-index: 999; pointer-events: none; }

        /* ========== 新增全屏居中样式 ========== */
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-bottom: 0;
        }
        .app-container {
            max-width: 540px;
            width: 100%;
            margin: 0 auto;
            background: #f5f7fb;
            position: relative;
            min-height: 100vh;
        }
        .card:last-of-type {
            margin-bottom: 90px;
        }
        .payment-bar {
            max-width: 540px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
        }
        .tabbar {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 原有全部内容 -->
    <div class="print-nav">
        <div class="print-nav-back" id="backBtn"><i class="fas fa-chevron-left"></i></div>
        <div class="print-nav-title">证件复印</div>
        <div class="print-nav-right"></div>
    </div>

    <div class="card">
        <div class="section-title"><i class="fas fa-id-card"></i> 证件类型</div>
        <div class="id-types" id="idTypeContainer">
            <div class="id-type-item" data-type="idcard">身份证</div>
            <div class="id-type-item" data-type="bankcard">银行卡</div>
            <div class="id-type-item" data-type="student">学生证</div>
            <div class="id-type-item" data-type="hukou">户口本</div>
            <div class="id-type-item" data-type="driver">驾驶证</div>
            <div class="id-type-item" data-type="passport">护照</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title"><i class="fas fa-palette"></i> 复印颜色</div>
        <div class="option-buttons">
            <div class="option-btn" data-color="bw">黑白</div>
            <div class="option-btn" data-color="color">彩色</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title"><i class="fas fa-layer-group"></i> 复印方式</div>
        <div class="option-buttons">
            <div class="option-btn" data-layout="double">双图排列</div>
            <div class="option-btn" data-layout="single">单图排列</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title"><i class="fas fa-copy"></i> 复印份数</div>
        <div class="quantity-control">
            <div class="quantity-btn" id="decrementQty">-</div>
            <div class="quantity-number" id="quantityValue">1</div>
            <div class="quantity-btn" id="incrementQty">+</div>
        </div>
        <div class="warning-text" style="margin-top: 16px;"><i class="fas fa-info-circle"></i> 提示：打印效果见左侧图示，打印结果均为单面，每份打印一张纸。</div>
        <button class="btn-primary" id="addTaskBtn"><i class="fas fa-plus-circle"></i> 开始制作</button>
    </div>

    <div class="card">
        <div class="section-title"><i class="fas fa-list-check"></i> 已制作（<span id="taskCount">0</span>/<span id="totalCopies">0</span>）</div>
        <div id="taskListContainer" class="task-list">
            <div class="empty-tasks" id="emptyTasksHint">暂无制作项，点击“开始制作”添加</div>
            <div id="dynamicTasks"></div>
        </div>
        <div class="warning-text">
            <i class="fas fa-exclamation-triangle"></i> 温馨提醒：线上照片方式复印相比到店使用打印机直接复印，清晰度略有不同，如复印件精度要求较高，请自行到店线下进行复印。
            <div style="display: flex; gap: 12px; margin-top: 10px;"><span>标准</span> <span>遮挡</span> <span>模糊</span></div>
        </div>
    </div>

    <div class="payment-bar">
        <div>
            <div style="font-size: 13px; color: #5b6e8c;">金额</div>
            <div class="total-price">¥ <span id="totalPrice">0.00</span></div>
        </div>
        <div class="confirm-btn" id="confirmPayBtn"><i class="fas fa-check-circle"></i> 确认支付</div>
    </div>
</div>
<script src="js/common.js"></script>
<script>
    // ========== 原证件复印的所有 JavaScript 代码（完整保留） ==========
    const priceMap = { idcard: { bw: 0.5, color: 1.0 }, bankcard: { bw: 0.5, color: 1.0 }, student: { bw: 0.6, color: 1.2 }, hukou: { bw: 0.8, color: 1.5 }, driver: { bw: 0.6, color: 1.2 }, passport: { bw: 0.7, color: 1.4 } };
    const typeNameMap = { idcard: '身份证', bankcard: '银行卡', student: '学生证', hukou: '户口本', driver: '驾驶证', passport: '护照' };
    let currentType = 'idcard';
    let currentColor = 'bw';
    let currentLayout = 'double';
    let currentQuantity = 1;
    let tasks = [];
    let nextId = 1;
    const idTypeItems = document.querySelectorAll('.id-type-item');
    const colorBtns = document.querySelectorAll('[data-color]');
    const layoutBtns = document.querySelectorAll('[data-layout]');
    const decrementBtn = document.getElementById('decrementQty');
    const incrementBtn = document.getElementById('incrementQty');
    const quantitySpan = document.getElementById('quantityValue');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const taskContainer = document.getElementById('dynamicTasks');
    const emptyHintTasks = document.getElementById('emptyTasksHint');
    const taskCountSpan = document.getElementById('taskCount');
    const totalCopiesSpan = document.getElementById('totalCopies');
    const totalPriceSpanCopy = document.getElementById('totalPrice');
    const backBtnCopy = document.getElementById('backBtn');
    const confirmBtnCopy = document.getElementById('confirmPayBtn');

    function showToastMessage(msg) { let toast = document.createElement('div'); toast.className = 'toast-message'; toast.innerText = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000); }
    function getUnitPrice(type, color) { return priceMap[type][color]; }
    function addCurrentTask() {
        const unitPrice = getUnitPrice(currentType, currentColor);
        const totalPriceItem = unitPrice * currentQuantity;
        tasks.push({ id: nextId++, type: currentType, color: currentColor, layout: currentLayout, quantity: currentQuantity, unitPrice: unitPrice, totalPrice: totalPriceItem });
        renderTasks();
        showToastMessage(`已添加 ${typeNameMap[currentType]} ${currentQuantity}份`);
    }
    function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); renderTasks(); showToastMessage('已移除一项'); }
    function renderTasks() {
        if (tasks.length === 0) { emptyHintTasks.style.display = 'block'; taskContainer.innerHTML = ''; }
        else {
            emptyHintTasks.style.display = 'none';
            let html = '';
            tasks.forEach(task => { const colorText = task.color === 'bw' ? '黑白' : '彩色'; const layoutText = task.layout === 'double' ? '双图排列' : '单图排列'; html += `<div class="task-item"><div class="task-info"><div class="task-name">${typeNameMap[task.type]}</div><div class="task-detail"><span>${colorText}</span><span>${layoutText}</span><span>${task.quantity}份</span></div></div><div class="task-price">¥${task.totalPrice.toFixed(2)}</div><div class="delete-task" data-id="${task.id}"><i class="fas fa-trash-alt"></i></div></div>`; });
            taskContainer.innerHTML = html;
            document.querySelectorAll('.delete-task').forEach(btn => { btn.addEventListener('click', (e) => { const id = parseInt(btn.getAttribute('data-id')); deleteTask(id); e.stopPropagation(); }); });
        }
        const totalCopies = tasks.reduce((sum, t) => sum + t.quantity, 0);
        taskCountSpan.innerText = tasks.length;
        totalCopiesSpan.innerText = totalCopies;
        const totalAmount = tasks.reduce((sum, t) => sum + t.totalPrice, 0);
        totalPriceSpanCopy.innerText = totalAmount.toFixed(2);
    }
    function updateTypeUI() { idTypeItems.forEach(el => { if (el.getAttribute('data-type') === currentType) el.classList.add('active'); else el.classList.remove('active'); }); }
    function updateColorUI() { colorBtns.forEach(btn => { if (btn.getAttribute('data-color') === currentColor) btn.classList.add('active'); else btn.classList.remove('active'); }); }
    function updateLayoutUI() { layoutBtns.forEach(btn => { if (btn.getAttribute('data-layout') === currentLayout) btn.classList.add('active'); else btn.classList.remove('active'); }); }
    function changeQuantity(delta) { let newVal = currentQuantity + delta; if (newVal < 1) newVal = 1; if (newVal > 99) newVal = 99; currentQuantity = newVal; quantitySpan.innerText = currentQuantity; }
    function bindEvents() {
        idTypeItems.forEach(el => { el.addEventListener('click', () => { currentType = el.getAttribute('data-type'); updateTypeUI(); }); });
        colorBtns.forEach(btn => { btn.addEventListener('click', () => { currentColor = btn.getAttribute('data-color'); updateColorUI(); }); });
        layoutBtns.forEach(btn => { btn.addEventListener('click', () => { currentLayout = btn.getAttribute('data-layout'); updateLayoutUI(); }); });
        decrementBtn.addEventListener('click', () => changeQuantity(-1));
        incrementBtn.addEventListener('click', () => changeQuantity(1));
        addTaskBtn.addEventListener('click', addCurrentTask);
        backBtnCopy.addEventListener('click', () => { if (typeof goTo === 'function') goTo('print.html'); else window.location.href = 'print.html'; });
        confirmBtnCopy.addEventListener('click', () => { if (tasks.length === 0) { showToastMessage('请至少添加一项制作'); return; } const total = tasks.reduce((s, t) => s + t.totalPrice, 0); let detail = `共 ${tasks.length} 项，合计 ¥${total.toFixed(2)}\n\n`; tasks.forEach(t => { detail += `${typeNameMap[t.type]} ${t.quantity}份 (${t.color === 'bw' ? '黑白' : '彩色'})  ¥${t.totalPrice.toFixed(2)}\n`; }); if (confirm(`确认支付？\n${detail}`)) { showToastMessage('支付成功！请到店取件'); tasks = []; renderTasks(); } });
    }
    function init() { updateTypeUI(); updateColorUI(); updateLayoutUI(); renderTasks(); bindEvents(); }
    init();
</script>
</body>
</html>
